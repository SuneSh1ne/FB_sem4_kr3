<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Список дел</title>
    <link rel="stylesheet" href="https://unpkg.com/chota@latest">
    <link rel="stylesheet" href="style.css">
    <!-- Web App Manifest -->
    <link rel="manifest" href="/manifest.json">

    <!-- Для Android -->
    <meta name="mobile-web-app-capable" content="yes">

    <!-- Цвет темы для браузера -->
    <meta name="theme-color" content="#3b82f6">

    <!-- Для iOS (иконка на экран) -->
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon-120x120.png">

    <!-- Для iOS (стиль строки состояния) -->
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <!-- Обычная фавиконка -->
    <link rel="icon" href="/icons/favicon.ico" sizes="16x16" type="image/ico">
</head>
<body>
    <div class="container">
        <h1>📝 Список дел</h1>
        <p class="subtitle">Работает даже без интернета</p>

        <form id="todo-form" class="row">
            <input class="col-9" type="text" id="todo-input" placeholder="Новая задача..." required>
            <button class="col-3" type="submit">Добавить</button>
        </form>

        <ul id="todo-list"></ul>

        <div id="status">🟢 Приложение готово к работе</div>
    </div>

    <script src="app.js"></script>
</body>
</html>
